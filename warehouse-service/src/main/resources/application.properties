spring.application.name=warehouse-service
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

warehouse.locations.location-1.id=warehouse-1
warehouse.locations.location-1.udp.temperature-port=3344
warehouse.locations.location-1.udp.humidity-port=3355
warehouse.locations.location-1.udp.buffer-size=1024
warehouse.locations.location-1.validation.temperature.min=-50.0
warehouse.locations.location-1.validation.temperature.max=100.0
warehouse.locations.location-1.validation.humidity.min=0.0
warehouse.locations.location-1.validation.humidity.max=100.0

warehouse.locations.location-2.id=warehouse-2
warehouse.locations.location-2.udp.temperature-port=3346
warehouse.locations.location-2.udp.humidity-port=3357
warehouse.locations.location-2.udp.buffer-size=1024
warehouse.locations.location-2.validation.temperature.min=-50.0
warehouse.locations.location-2.validation.temperature.max=100.0
warehouse.locations.location-2.validation.humidity.min=0.0
warehouse.locations.location-2.validation.humidity.max=100.0

warehouse.kafka.topics.temperature=temperature.readings
warehouse.kafka.topics.humidity=humidity.readings

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

logging.level.root=INFO
logging.level.com.warehouse.monitoring=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.reactor.kafka=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

server.port=8081
